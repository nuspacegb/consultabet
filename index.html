<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ConsultaBet - Nu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0e; --card: #16161d; --purple: #8a05be; --neon: #bc13fe; --green: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { width: 100%; max-width: 450px; background: var(--card); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { background: linear-gradient(to right, #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; font-size: 1.8rem; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #2d2d35; background: #1c1c24; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--purple); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--neon); box-shadow: 0 0 20px var(--neon); transform: translateY(-2px); }
        .res { margin-top: 30px; padding: 20px; border-radius: 12px; display: none; text-align: left; background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--green); line-height: 1.6; }
        footer { margin-top: 30px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

<div class="box">
    <h1>ConsultaBet - Nu</h1>
    <input type="text" id="term" placeholder="CNPJ, Marca ou Empresa...">
    <button onclick="check()">Verificar Agora</button>
    <div id="out" class="res"></div>
    <footer>Elaborado por <strong>Alexandre Gabbia</strong></footer>
</div>

<script>
async function check() {
    const term = document.getElementById('term').value.toLowerCase().trim();
    const cleanTerm = term.replace(/\D/g, '');
    const out = document.getElementById('out');

    if (!term) return;

    try {
        const resp = await fetch('bets.csv');
        const buffer = await resp.arrayBuffer();
        const text = new TextDecoder('iso-8859-1').decode(buffer);
        const rows = text.split(/\r?\n/);

        let lastFoundCnpj = "";
        let result = null;

        for (let i = 0; i < rows.length; i++) {
            let line = rows[i].replace(/"/g, '');
            let cols = line.split(/[;,]/).map(c => c.trim());

            // No seu CSV, o CNPJ está na coluna 2 (índice 2)
            // Se a coluna do CNPJ tiver valor, atualizamos o "último CNPJ conhecido"
            if (cols[2] && cols[2].length > 5) {
                lastFoundCnpj = cols[2];
            }

            // Texto completo da linha para busca (Interessado + Marca)
            let rowContent = (cols[3] || "") + " " + (cols[4] || "");
            let rowContentLower = rowContent.toLowerCase();

            // Se o que o usuário digitou está nesta linha (ou é o CNPJ)
            if (rowContentLower.includes(term) || (cleanTerm !== "" && lastFoundCnpj.replace(/\D/g, '').includes(cleanTerm))) {
                result = {
                    cnpj: lastFoundCnpj,
                    razao: cols[3] || "Não informada",
                    marca: cols[4] || "Não informada"
                };
                if (rowContentLower.includes(term)) break; // Prioriza achar a marca exata
            }
        }

        out.style.display = 'block';
        if (result && result.marca !== "Não informada") {
            out.style.borderColor = "var(--green)";
            out.innerHTML = `<b style="color:var(--green); font-size: 1.1rem;">✅ REGULAMENTADA</b><br><br>
                             <strong>Marca:</strong> ${result.marca}<br>
                             <strong>Interessado:</strong> ${result.razao}<br>
                             <strong>CNPJ:</strong> ${result.cnpj}`;
        } else {
            out.style.borderColor = "#ff4444";
            out.innerHTML = `<b style="color:#ff4444">❌ NÃO ENCONTRADA</b><br><br>Empresa ou marca não localizada na lista oficial de autorizadas.`;
        }
    } catch (e) { 
        console.error(e);
        alert("Erro ao ler o arquivo bets.csv no GitHub."); 
    }
}
</script>
</body>
</html>
