<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultaBet - Nu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #16161d;
            --primary-purple: #8a05be;
            --neon-purple: #bc13fe;
            --text-color: #ffffff;
            --success: #00ff88;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #2d2d35;
            background: #1c1c24;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary-purple);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--success);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ConsultaBet - Nu</h1>
        <input type="text" id="searchInput" placeholder="CNPJ, Marca ou Razão Social...">
        <button onclick="buscarNoCSV()">Consultar Planilha</button>

        <div id="resultBox" class="result">
            <span id="statusTxt" style="font-weight: bold; display: block; margin-bottom: 10px;"></span>
            <div id="infoData"></div>
        </div>
    </div>

    <footer>
        Elaborado por <strong>Alexandre Gabbia</strong><br>
        <span id="updateDate">Base: Planilha Oficial SPA/MF 2026</span>
    </footer>

    <script>
        function buscarNoCSV() {
            const termoBusca = document.getElementById('searchInput').value.toLowerCase().trim();
            const cleanBusca = termoBusca.replace(/\D/g, '');
            const resultBox = document.getElementById('resultBox');
            const infoData = document.getElementById('infoData');
            const statusTxt = document.getElementById('statusTxt');

            // Lendo o arquivo CSV que você subiu no GitHub
            Papa.parse("bets.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const dados = results.data;
                    
                    // Procurar na planilha (ajustado para os nomes das colunas da sua planilha)
                    const encontrado = dados.find(linha => {
                        const cnpjPlanilha = (linha["CNPJ"] || "").replace(/\D/g, '');
                        const razaoSocial = (linha["INTERESSADO"] || "").toLowerCase();
                        const marca = (linha["MARCA"] || "").toLowerCase();

                        return (
                            (cleanBusca !== "" && cnpjPlanilha.includes(cleanBusca)) ||
                            razaoSocial.includes(termoBusca) ||
                            marca.includes(termoBusca)
                        );
                    });

                    resultBox.style.display = 'block';

                    if (encontrado) {
                        statusTxt.innerText = "✅ REGULAMENTADA";
                        statusTxt.style.color = "var(--success)";
                        resultBox.style.borderColor = "var(--success)";
                        infoData.innerHTML = `
                            <p><strong>Marca(s):</strong> ${encontrado["MARCA"] || 'N/A'}</p>
                            <p><strong>Razão Social:</strong> ${encontrado["INTERESSADO"] || 'N/A'}</p>
                            <p><strong>CNPJ:</strong> ${encontrado["CNPJ"] || 'N/A'}</p>
                        `;
                    } else {
                        statusTxt.innerText = "❌ NÃO ENCONTRADA";
                        statusTxt.style.color = "#ff4444";
                        resultBox.style.borderColor = "#ff4444";
                        infoData.innerHTML = "<p>Esta empresa não foi localizada na base atual.</p>";
                    }
                }
            });
        }
    </script>
</body>
</html>
